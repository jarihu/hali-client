name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build hali
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -tags oss \
            -ldflags "-s -w \
              -X hali/internal/buildinfo.Version=${{ github.ref_name }} \
              -X hali/internal/buildinfo.Commit=${{ github.sha }} \
              -X hali/internal/buildinfo.BuildMode=release \
              -X hali/internal/buildinfo.Edition=oss" \
            -o dist/hali-${{ matrix.suffix }}${{ matrix.ext }} \
            .

      - name: Build halid (daemon)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -tags oss \
            -ldflags "-s -w \
              -X hali/internal/buildinfo.Version=${{ github.ref_name }} \
              -X hali/internal/buildinfo.Commit=${{ github.sha }} \
              -X hali/internal/buildinfo.BuildMode=release \
              -X hali/internal/buildinfo.Edition=oss" \
            -o dist/halid-${{ matrix.suffix }}${{ matrix.ext }} \
            ./cmd/service

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          fail_on_unmatched_files: true
