name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            pkg: deb
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            pkg: deb
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
            pkg: nsis

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build hali
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -tags oss \
            -ldflags "-s -w \
              -X hali/internal/buildinfo.Version=${{ github.ref_name }} \
              -X hali/internal/buildinfo.Commit=${{ github.sha }} \
              -X hali/internal/buildinfo.BuildMode=release \
              -X hali/internal/buildinfo.Edition=oss" \
            -o dist/hali-${{ matrix.suffix }}${{ matrix.ext }} \
            .

      - name: Build halid (daemon)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -tags oss \
            -ldflags "-s -w \
              -X hali/internal/buildinfo.Version=${{ github.ref_name }} \
              -X hali/internal/buildinfo.Commit=${{ github.sha }} \
              -X hali/internal/buildinfo.BuildMode=release \
              -X hali/internal/buildinfo.Edition=oss" \
            -o dist/halid-${{ matrix.suffix }}${{ matrix.ext }} \
            ./cmd/service

      - name: Install nfpm
        if: matrix.pkg == 'deb'
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.46.3/nfpm_2.46.3_amd64.deb -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build .deb package
        if: matrix.pkg == 'deb'
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          envsubst < packaging/nfpm.yaml > /tmp/nfpm-resolved.yaml
          nfpm pkg \
            --config /tmp/nfpm-resolved.yaml \
            --packager deb \
            --target dist/hali_${{ github.ref_name }}_linux_${{ matrix.goarch }}.deb

      - name: Install NSIS
        if: matrix.pkg == 'nsis'
        run: sudo apt-get install -y nsis

      - name: Build Windows installer
        if: matrix.pkg == 'nsis'
        run: makensis -DVERSION=${{ github.ref_name }} packaging/hali.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          fail_on_unmatched_files: true
